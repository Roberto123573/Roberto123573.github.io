<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HOTE MAR AZUL</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .login-form .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .login-form label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }

        .login-form input[type="text"],
        .login-form input[type="password"] {
            width: calc(100% - 20px); /* 100% menos o padding */
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .login-form button {
            background-color: #007bff; /* Azul do seu cabeçalho */
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        .login-form button:hover {
            background-color: #0056b3;
        }

        #error-message { /* Alterado para ID para facilitar o JS */
            color: red;
            margin-top: 10px;
            font-size: 0.9em;
            display: none; /* Escondido por padrão */
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>INICIAR CESSÃO</h2>
        <form class="login-form" onsubmit="return handleLogin(event);">
            <div class="form-group">
                <label for="username">Usuário:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Entrar</button>
            <p id="error-message"></p> </form>

    <div class="help-links">
    <p><a href="recuperar_senha.html">Esqueceu sua senha?</a></p>
    <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se aqui</a></p>
</div>

    <script>
        function handleLogin(event) {
            event.preventDefault();

            const errorMessage = document.getElementById('error-message');

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username.trim() !== '' && password.trim() !== '') {
                window.location.href = "inicio.html";
            } else {
                errorMessage.textContent = "Por favor, preencha usuário e senha.";
                errorMessage.style.display = 'block';
            }


            return false;
        }
    </script>
</body>
</html>
